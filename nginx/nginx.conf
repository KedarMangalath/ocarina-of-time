events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        # Inside the container, Nginx listens on port 80.
        # We will map the outside port (2348) to this 80 in Docker Compose.
        listen 80;

        # 1. Serve React Frontend (Static Files)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 2. Proxy API requests to Django Backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Proxy Admin panel to Django
        location /admin/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. Serve Django Static Files (CSS for Admin panel)
        location /static/ {
            alias /app/static/;
        }
    }
}